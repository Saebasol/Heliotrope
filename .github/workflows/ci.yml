name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  style:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v3
      - name: Setup python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"
      - name: Setup uv
        run: |
          python -m pip install pip
          pip install uv
      - name: Install dependencies
        run: uv sync --group style
      - name: Check style with ruff
        run: uv run ruff format --check

  type:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v3
      - name: Setup python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"
      - name: Setup uv
        run: |
          python -m pip install pip
          pip install uv
      - name: Install dependencies
        run: uv sync --group type
      - name: Check type
        run: uv run pyright
      - name: Check untyped function
        run: uv run mypy
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: heliotrope_user
          POSTGRES_PASSWORD: heliotropepasswd
          POSTGRES_DB: heliotrope_db
        ports:
          - 127.0.0.1:5432:5432
      mongo:
        image: mongo
        env:
          MONGO_INITDB_ROOT_USERNAME: heliotrope_user
          MONGO_INITDB_ROOT_PASSWORD: heliotropepasswd
        ports:
          - 127.0.0.1:27017:27017
    steps:
      - name: Checkout branch
        uses: actions/checkout@v3
      - name: Setup python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"
      - name: Setup uv
        run: |
          python -m pip install pip
          pip install uv
      - name: Install dependencies
        run: uv sync --group test
      - name: Check test
        run: uv run pytest --asyncio-mode=auto --cov=heliotrope --cov-report=xml
      - name: Codecov
        uses: codecov/codecov-action@v5

  build-image:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    needs: [type, test, style]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
      - name: Set lowercase image name
        run: echo "IMAGE_NAME_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to the Container registry
        if: github.event_name == 'release'
        uses: docker/login-action@v1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}
      - name: Set platform pair
        run: echo "PLATFORM_PAIR=${PLATFORM//\//-}" >> $GITHUB_ENV
        env:
          PLATFORM: ${{ matrix.platform }}
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }},push-by-digest=true,name-canonical=true,push=${{ github.event_name == 'release' }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Export digest
        if: github.event_name == 'release'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - name: Upload digest
        if: github.event_name == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-image:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    needs: [build-image]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set lowercase image name
        run: echo "IMAGE_NAME_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to the Container registry
        uses: docker/login-action@v1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}
      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< '$DOCKER_METADATA_OUTPUT_JSON') \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}@sha256:%s ' *)
